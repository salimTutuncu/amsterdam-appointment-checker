name: Check appointment availability

on:
  schedule:
    # GitHub-side fallback (every 15 min — GitHub throttles shorter cadences
    # on free public repos). The real cadence is driven by an EXTERNAL
    # scheduler that hits workflow_dispatch every 5 minutes.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # primary trigger — used by the external 5-min scheduler

# Only one run at a time — if a previous run is still walking the form,
# skip overlap.
concurrency:
  group: appt-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      NTFY_TOPIC: "ams-appt-salim-db6da02b14"
      # Target dates for auto-booking. The script grabs the earliest matching
      # slot at the earliest matching location.
      BOOK_ON_1: "2026-05-14"
      BOOK_ON_2: "2026-05-15"
      # Personal details for UwGegevens. Sourced from repo secrets — never
      # commit raw values here.
      BOOKING_VOORNAAM: ${{ secrets.BOOKING_VOORNAAM }}
      BOOKING_ACHTERNAAM: ${{ secrets.BOOKING_ACHTERNAAM }}
      BOOKING_GEBOORTEDATUM: ${{ secrets.BOOKING_GEBOORTEDATUM }}
      BOOKING_LANDCODE: ${{ secrets.BOOKING_LANDCODE }}
      BOOKING_TELEFOONNUMMER: ${{ secrets.BOOKING_TELEFOONNUMMER }}
      BOOKING_EMAILADRES: ${{ secrets.BOOKING_EMAILADRES }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore booked sentinel
        uses: actions/cache/restore@v4
        with:
          path: .booked.txt
          key: booked-${{ github.run_id }}
          restore-keys: |
            booked-

      - name: Run availability check + auto-book
        run: |
          python check.py \
            --book-on "$BOOK_ON_1" \
            --book-on "$BOOK_ON_2" \
            --booked-marker .booked.txt
          echo "--- booked sentinel ---"
          cat .booked.txt 2>/dev/null || echo "(not booked)"

      - name: Save booked sentinel
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .booked.txt
          key: booked-${{ github.run_id }}
